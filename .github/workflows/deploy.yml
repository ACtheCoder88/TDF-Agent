name: Deploy dashboard to Pages

# Replaces the legacy "Deploy from a branch" Pages pipeline, which intermittently
# failed with GitHub's transient "Deployment failed, try again later" error and
# left the live site stale. This workflow:
#   - uses a concurrency group so overlapping pushes cancel cleanly (not "fail"),
#   - retries the deploy up to 3x with escalating backoff (0/30s/60s) so a short
#     Pages-API outage (~90s) is ridden out silently instead of emailing a failure
#     ("try again later" is an early reject with no deployment created, so re-calling
#     deploy-pages is safe — no double-deploy),
#   - skips Jekyll entirely (the dashboard is a plain static SPA).
# Requires repo Settings > Pages > Source = "GitHub Actions" (one-time toggle).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Latest push wins; an in-flight deploy is cancelled (shows as "cancelled", not
# "failure") rather than racing — this kills the concurrency-collision failures.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Attempts 1 and 2 may fail (GitHub's transient "try again later"); each later
      # step runs only if all prior attempts failed. The FINAL attempt is not
      # continue-on-error, so if even it fails the job fails and you get one email —
      # by then it's a genuinely persistent problem worth knowing about.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Pause before attempt 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Pause before attempt 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 3, final)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
